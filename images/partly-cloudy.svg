<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" role="img" aria-labelledby="weather-icon-title">
  <title id="weather-icon-title">Partly Cloudy</title>

  <!-- Sun rays -->
  <line x1="36" y1="5"  x2="36" y2="14" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="36" y1="51" x2="36" y2="42" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8"  y1="28" x2="17" y2="28" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="55" y1="28" x2="64" y2="28" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="14.1" y1="9.1"  x2="20.4" y2="15.4" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="51.6" y1="9.1"  x2="45.3" y2="15.4" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="14.1" y1="46.9" x2="20.4" y2="40.6" stroke="#FFB300" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sun body -->
  <circle cx="36" cy="28" r="14" fill="#FFB300"/>
  <!-- Sun highlight -->
  <circle cx="31" cy="23" r="4" fill="#FFD54F" opacity="0.5"/>

  <!-- Cloud body – overlaps sun -->
  <circle cx="70" cy="60" r="20" fill="#E2E8EE"/>
  <circle cx="88" cy="65" r="16" fill="#E2E8EE"/>
  <circle cx="54" cy="67" r="13" fill="#E2E8EE"/>
  <rect x="54" y="59" width="50" height="22" rx="5" fill="#E2E8EE"/>

  <!-- Cloud highlight -->
  <ellipse cx="68" cy="54" rx="12" ry="6" fill="white" opacity="0.6"/>
</svg>
