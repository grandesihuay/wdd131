<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Temple album where can see images from differents parts of the world, this can be used in movile or PC (responsive)">
  <meta name="author" content="Billy Grande">
  <title>Temple Album</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Mobile-first then large-screen overrides -->
  <link rel="stylesheet" href="styles/temples.css" />
  <link rel="stylesheet" href="styles/temples-large.css" />

  <script src="scripts/temples.js" defer></script>

</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⛩</span>
        <span class="brand-text">Temple Album</span>
      </div>

      <!-- Hamburger button (visible on mobile only) -->
      <button id="hamburger-btn" aria-label="Toggle navigation" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav id="main-nav" aria-label="Primary navigation">
        <ul>
          <li><a href="#all">Home</a></li>
          <li><a href="#old">Old</a></li>
          <li><a href="#new">New</a></li>
          <li><a href="#large">Large</a></li>
          <li><a href="#small">Small</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <h1>Temples Around the World</h1>
    <p class="subtitle">Church of Jesus Christ of Latter-day Saints</p>

    <div class="gallery">

      <figure>
        <img
          src="images/templosud.webp"
          alt="Salt Lake Temple"
          loading="lazy"
          width="600"
          height="400"
        />
        <figcaption>Salt Lake Temple — Utah, USA</figcaption>
      </figure>

      <figure>
        <img
          src="images/templosud.webp"
          alt="Nauvoo Temple"
          loading="lazy"
          width="600"
          height="400"
        />
        <figcaption>Nauvoo Temple — Illinois, USA</figcaption>
      </figure>

      <figure>
        <img
          src="images/templosud.webp"
          alt="Rome Italy Temple"
          loading="lazy"
          width="600"
          height="400"
        />
        <figcaption>Rome Italy Temple — Rome, Italy</figcaption>
      </figure>

      <figure>
        <img
          src="images/templosud.webp"
          alt="Tokyo Japan Temple"
          loading="lazy"
          width="600"
          height="400"

      <figure>
        <img
          src="images/templosud.webp"

      <figure>

          width="600"
          height="400"
        />
        <figcaption>Paris France Temple — Versailles, France</figcaption>
      </figure>

      <figure>
        <img
          src="images/templosud.webp"
          alt="Dubai UAE Temple"
          loading="lazy"
          width="600"
          height="400"
        />
        <figcaption>Dubai UAE Temple — Dubai, UAE</figcaption>

      <figure>
        <img
          src="images/templosud.webp"
